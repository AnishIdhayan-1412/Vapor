<!DOCTYPE>
<html>
    <head>
        <title>Vapor</title>
        <script>
            setTimeout(function(){
            location.reload();
        }, 10000);
</script>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f8fafc;
                color: #1f2937;
            }
            .container {
                margin: 40px auto;
                padding: 20px;
                background: #ffffff;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            }
            h1 {
                margin: 0 0 10px;
                font-size: 2rem;
                text-align: center;
            }
            h2 {
                margin: 0 0 20px;
                font-size: 1rem;
                color: #4b5563;
                text-align: center;
                font-weight: normal;
            }
            .confession {
                padding: 16px;
                border-radius: 8px;
                background: #f1f5f9;
            }
            .confession + hr {
                margin-top: 20px;
            }
            p {
                margin: 0 0 10px;
                line-height: 1.6;
                text-align: center;
            }
            small {
                margin: 0px 650px 10px;
                color: #6b7280;
                text-align: center;
                align-items: center;
            }
            .empty-state {
                text-align: center;
                color: #6b7280;
                padding: 20px 0;
            }
            .confession{
                align-items: center;
                align-content: center;
            }
            .header {
                display: flex;
                justify-content: flex-end;
                padding: 20px;
                background: #ffffff;
                border-bottom: 1px solid #e5e7eb;
            }
            .btn{
                padding: 10px 20px;
                background: #3b82f6;
                color: #ffffff;
                text-decoration: none;
                border-radius: 5px;
                transition: background 0.3s ease;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <a href="/submit" class="btn">Confess</a>
        </header>
        <h1>Vapor</h1>
        <h2>Anonymous confessions . Gone in 48 Hours.</h2>
        <hr>
        {% for confession in confessions %}
        <div class="confession">
            <p>{{confession.text}}</p>
            <small>{{confession.time_remaining}}</small>
            <form method="POST" action="/report/{{ confession.id }}/">
            {% csrf_token %}
            <button type="submit">🚩 Report</button>
            </form>
        </div>
        <hr>
        {% empty %}
        <p>No confessions yet.</p>
        {% endfor %}
    </body>
</html>
